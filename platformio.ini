[platformio]
default_envs = esp32-a1s
src_dir = main
extra_configs = user_platformio.ini

; Common settings for all environments
[env]
monitor_speed = 115200
monitor_filters = direct
board_build.filesystem = spiffs
extra_scripts = post:scripts/uploadfs_hook.py
build_flags =
    -Wno-maybe-uninitialized
    -Os
    -DCONFIG_SPIRAM_SIZE=8388608

[env:squeezeamp]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = esp-wrover-kit
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = qio
board_build.flash_size = 8MB
board_build.partitions = components/boards/partitions.csv
board_upload.flash_size = 8MB
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.squeezeamp"
monitor_rts=0
monitor_dtr=0

[env:squeezeamp-bt]
extends = env:squeezeamp
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.squeezeamp;sdkconfig.defaults.bt"
    
[env:squeezeamp-4m]
extends = env:squeezeamp
board_build.flash_size = 4MB
board_build.partitions = components/boards/partitions-4m.csv
board_upload.flash_size = 4MB
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.squeezeamp-4m"

[env:esp32s3]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.flash_size = 16MB
board_build.partitions = components/boards/partitions.csv
board_upload.flash_size = 16MB
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.esp32s3"

[env:esp32s3-jtag]
extends = env:esp32s3
upload_protocol = esp-builtin

[env:esp32wrover-dev]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = freenove_esp32_wrover
board_build.mcu = esp32
board_build.partitions = components/boards/partitions-4m.csv
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.wrover;sdkconfig.defaults.bt"

[env:esp32-a1s]
# Pinned known-good environment for Ai-Thinker ESP32-A1S.
# This locks the PlatformIO platform, ESP-IDF, toolchain, and flash tools
# to the exact versions that produced a verified working audio build.
platform = platformio/espressif32 @ 6.12.0
framework = espidf
board = esp-wrover-kit
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = qio
board_build.flash_size = 4MB
board_build.partitions = components/boards/partitions-4m.csv
board_upload.flash_size = 4MB
platform_packages =
    platformio/framework-espidf@3.50500.0
    platformio/tool-cmake@3.30.2
    platformio/tool-esp-rom-elfs@0.0.1+20241011
    platformio/tool-esptoolpy@2.40900.250804
    platformio/tool-mkfatfs@2.0.1
    platformio/tool-mklittlefs@1.203.210628
    platformio/tool-mkspiffs@2.230.0
    platformio/tool-ninja@1.13.2
    espressif/tool-riscv32-esp-elf-gdb@12.1.0+20221002
    espressif/tool-xtensa-esp-elf-gdb@12.1.0+20221002
    platformio/toolchain-esp32ulp@1.23800.240113
    platformio/toolchain-xtensa-esp-elf@14.2.0+20241119
board_build.cmake_extra_args =
    "-DSDKCONFIG_DEFAULTS=sdkconfig.defaults;sdkconfig.defaults.esp32-a1s;sdkconfig.defaults.bt"
monitor_rts=0
monitor_dtr=0

[env:esparagus-audio-brick]
platform = platformio/espressif32 @ ^6.12.0
framework = espidf
board = esp-wrover-kit
board_build.mcu = esp32
board_build.f_cpu = 240000000L
board_build.f_flash = 40000000L
board_build.flash_mode = qio
